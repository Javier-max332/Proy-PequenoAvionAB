<!DOCTYPE html>
<!-- =========================================================
     DECLARACIÓN DEL DOCUMENTO HTML5
     ========================================================= -->
<html xmlns:th="http://www.thymeleaf.org">

    <head>
        <!-- =====================================================
             CONFIGURACIÓN GENERAL
             ===================================================== -->

        <!-- Permite caracteres especiales y acentos -->
        <meta charset="UTF-8">

        <!-- Título que aparece en la pestaña -->
        <title>Crear Cuenta - Pequeño Avión</title>

        <!-- Ícono de la página -->
        <link rel="icon" type="image/png" th:href="@{/img/favicon.png}">
    </head>

    <!-- =========================================================
         CUERPO PRINCIPAL
         ========================================================= -->
    <body style="background-color: #0b0f19; color: white; font-family: sans-serif; text-align: center; padding-top: 50px;">

        <!-- =====================================================
             TÍTULO Y DESCRIPCIÓN
             ===================================================== -->

        <!-- Título principal -->
        <h2>Regístrate en Pequeño Avión</h2>

        <!-- Texto descriptivo -->
        <p style="color: #9ca3af; margin-bottom: 30px;">
            Crea tu cuenta para armar el setup de tus sueños
        </p>

        <!-- =====================================================
             MENSAJE DE ERROR
             ===================================================== -->

        <!-- 
            Si existe un error enviado desde el controlador,
            se mostrará este mensaje
        -->
        <div th:if="${error}" 
             style="color: #ef4444; margin-bottom: 20px; font-weight: bold;" 
             th:text="${error}">
        </div>

        <!-- =====================================================
             FORMULARIO DE REGISTRO
             ===================================================== -->

        <!-- 
            El formulario envía los datos usando POST
            hacia la ruta /registro
        -->
        <form th:action="@{/registro}" 
              method="post" 
              style="background: #111827; display: inline-block; padding: 30px; border-radius: 8px; text-align: left;">

            <!-- =================================================
                 CAMPO: NOMBRE COMPLETO
                 ================================================= -->
            <div style="margin-bottom: 15px;">

                <label style="display: block; margin-bottom: 5px;">
                    Nombre Completo:
                </label>

                <input type="text"
                       name="nombreCompleto"
                       required
                       style="padding: 8px; width: 250px; background: #1f2937; border: 1px solid #374151; color: white; border-radius: 4px;">
            </div>

            <!-- =================================================
                 CAMPO: NOMBRE DE USUARIO
                 ================================================= -->
            <div style="margin-bottom: 15px;">

                <label style="display: block; margin-bottom: 5px;">
                    Nombre de Usuario:
                </label>

                <input type="text"
                       name="username"
                       required
                       style="padding: 8px; width: 250px; background: #1f2937; border: 1px solid #374151; color: white; border-radius: 4px;">
            </div>

            <!-- =================================================
                 CAMPO: CORREO ELECTRÓNICO
                 ================================================= -->
            <div style="margin-bottom: 15px;">

                <label style="display: block; margin-bottom: 5px;">
                    Correo Electrónico:
                </label>

                <!-- 
                    type="email" valida automáticamente
                    el formato del correo
                -->
                <input type="email"
                       name="email"
                       required
                       style="padding: 8px; width: 250px; background: #1f2937; border: 1px solid #374151; color: white; border-radius: 4px;">
            </div>

            <!-- =================================================
                 CAMPO: TELÉFONO
                 ================================================= -->
            <div style="margin-bottom: 15px;">

                <label style="display: block; margin-bottom: 5px;">
                    Teléfono:
                </label>

                <input type="tel"
                       name="telefono"
                       required
                       style="padding: 8px; width: 250px; background: #1f2937; border: 1px solid #374151; color: white; border-radius: 4px;">
            </div>

            <!-- =================================================
                 CAMPO: FECHA DE NACIMIENTO
                 ================================================= -->
            <div style="margin-bottom: 15px;">

                <label style="display: block; margin-bottom: 5px;">
                    Fecha de Nacimiento:
                </label>

                <!-- 
                    Spring Boot convierte automáticamente
                    este input a LocalDate
                -->
                <input type="date"
                       name="fechaNacimiento"
                       required
                       style="padding: 8px; width: 250px; background: #1f2937; border: 1px solid #374151; color: white; border-radius: 4px; color-scheme: dark;">
            </div>

            <!-- =================================================
                 CAMPO: CONTRASEÑA
                 ================================================= -->
            <div style="margin-bottom: 25px;">

                <label style="display: block; margin-bottom: 5px;">
                    Contraseña:
                </label>

                <!-- 
                    type="password" oculta los caracteres
                    escritos por el usuario
                -->
                <input type="password"
                       name="password"
                       required
                       style="padding: 8px; width: 250px; background: #1f2937; border: 1px solid #374151; color: white; border-radius: 4px;">
            </div>

            <!-- =================================================
                 BOTÓN DE REGISTRO
                 ================================================= -->

            <button type="submit"
                    style="background: #10b981; color: white; padding: 12px; width: 100%; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px;">

                Crear Cuenta
            </button>

            <!-- =================================================
                 ENLACE PARA INICIAR SESIÓN
                 ================================================= -->
            <div style="margin-top: 15px; text-align: center;">

                <a th:href="@{/login}"
                   style="color: #3b82f6; text-decoration: none; font-size: 14px;">

                    ¿Ya tienes cuenta? Inicia sesión aquí
                </a>
            </div>

        </form>

    </body>
</html>
